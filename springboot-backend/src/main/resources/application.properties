# Application
spring.application.name=app

# Server
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=${java.io.tmpdir}

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mubashir_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=your-mysql-username
spring.datasource.password=your-mysql-password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA/Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.id.uuid-identifier-strategy=org.hibernate.id.uuid.CustomVersionOneStrategy

# JWT Configuration
jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLWFuZC12YWxpZGF0aW9uLXdpdGgtMjU2LWJpdHM=}
jwt.expiration=86400000

# ✅ FIX: Corrected AI service URL (was wrong port 5678 and wrong path /app/generate)
# FastAPI runs on port 8000, and the correct endpoint is /app/generate
# (we added this endpoint to FastAPI to match what Spring expects)
ai.service.url=http://localhost:8000/app/generate
ai.service.connection-timeout=5000
ai.service.read-timeout=30000
ai.service.max-attempts=3

# File Storage
file.upload-dir=${user.home}/app-uploads
file.max-size=30485760
file.max-total-storage=10737418240

